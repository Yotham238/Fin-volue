<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINANCE PRO COACH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN SYSTEM — Finance Pro Coach
   Dark premium dashboard, Syne + DM Sans
   ============================================================ */
:root {
  --bg-base:    #0a0c10;
  --bg-surface: #11141c;
  --bg-card:    #181c27;
  --bg-hover:   #1e2333;
  --border:     #252a3a;
  --border-light:#2e3550;
  --accent:     #4f8eff;
  --accent-glow:#4f8eff33;
  --accent2:    #22d3a0;
  --accent3:    #f5a623;
  --accent4:    #e05cff;
  --danger:     #ff4d6d;
  --text-1:     #eef0f6;
  --text-2:     #9099b8;
  --text-3:     #5a6285;
  --radius:     12px;
  --radius-lg:  18px;
  --shadow:     0 4px 32px #00000055;
  --font-display:'Syne', sans-serif;
  --font-body:  'DM Sans', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--bg-base);
  color:var(--text-1);
  min-height:100vh;
  line-height:1.6;
  overflow-x:hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-base)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}

/* ── Typography ── */
h1,h2,h3,h4{font-family:var(--font-display);letter-spacing:-0.02em}
a{color:var(--accent);text-decoration:none}
code{font-size:0.85em;background:var(--bg-hover);padding:2px 6px;border-radius:4px;color:var(--accent2)}

/* ── Layout Shell ── */
#app{display:flex;flex-direction:column;min-height:100vh}
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:60px;
  background:rgba(10,12,16,0.92);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.topbar-logo{
  font-family:var(--font-display);font-weight:800;font-size:1.1rem;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  display:flex;align-items:center;gap:8px;
}
.topbar-logo span{font-size:1.3rem}
.xp-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:999px;padding:6px 14px;font-size:0.82rem;font-weight:500;
}
.xp-pill .xp-val{color:var(--accent3);font-family:var(--font-display);font-weight:700}
.xp-pill .xp-label{color:var(--text-2)}

/* ── Nav Tabs ── */
.nav-tabs{
  display:flex;gap:4px;padding:16px 24px 0;
  border-bottom:1px solid var(--border);
  background:var(--bg-surface);
  overflow-x:auto;
}
.nav-tab{
  padding:10px 18px;border-radius:8px 8px 0 0;
  font-size:0.85rem;font-weight:500;cursor:pointer;
  color:var(--text-2);border:1px solid transparent;
  border-bottom:none;transition:all .2s;white-space:nowrap;
  background:transparent;
}
.nav-tab:hover{color:var(--text-1);background:var(--bg-hover)}
.nav-tab.active{
  color:var(--accent);background:var(--bg-base);
  border-color:var(--border);
}

/* ── Main ── */
.main{flex:1;padding:28px 24px;max-width:1100px;margin:0 auto;width:100%}

/* ── Cards ── */
.card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:24px;
  transition:border-color .2s;
}
.card:hover{border-color:var(--border-light)}
.card-sm{padding:16px 18px}
.card-accent{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-glow)}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 20px;border-radius:var(--radius);
  font-family:var(--font-body);font-size:0.9rem;font-weight:500;
  cursor:pointer;border:none;transition:all .2s;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#6ba3ff;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text-1)}
.btn-success{background:var(--accent2);color:#0a0c10}
.btn-success:hover{filter:brightness(1.1)}
.btn-sm{padding:7px 14px;font-size:0.82rem}

/* ── Module Grid ── */
.module-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
  gap:16px;margin-top:20px;
}
.module-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px;cursor:pointer;
  transition:all .25s;position:relative;overflow:hidden;
}
.module-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--accent-glow),transparent);
  opacity:0;transition:opacity .3s;
}
.module-card:hover::before{opacity:1}
.module-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.module-card.done{border-color:var(--accent2)}
.module-card.done::after{
  content:'✓';position:absolute;top:12px;right:12px;
  width:22px;height:22px;border-radius:50%;
  background:var(--accent2);color:#0a0c10;
  font-size:0.75rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.mod-icon{font-size:1.8rem;margin-bottom:12px}
.mod-title{font-family:var(--font-display);font-weight:700;font-size:1rem;margin-bottom:4px}
.mod-desc{font-size:0.82rem;color:var(--text-2);line-height:1.5}
.mod-progress{
  margin-top:14px;height:3px;background:var(--border);border-radius:99px;
}
.mod-progress-bar{height:100%;border-radius:99px;background:var(--accent);transition:width .4s}

/* ── Chat Interface ── */
.chat-container{display:flex;flex-direction:column;gap:0}
.chat-header{
  display:flex;align-items:center;gap:14px;
  padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:20px;
}
.chat-header .back-btn{
  background:var(--bg-hover);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;cursor:pointer;
  color:var(--text-2);font-size:0.85rem;transition:all .2s;
}
.chat-header .back-btn:hover{color:var(--text-1);border-color:var(--border-light)}
.chat-messages{
  display:flex;flex-direction:column;gap:16px;
  min-height:300px;max-height:55vh;overflow-y:auto;
  padding:4px 2px;
}
.msg{display:flex;gap:12px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:700;
}
.msg.prof .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--accent4));color:#fff}
.msg.user .msg-avatar{background:var(--bg-hover);border:1px solid var(--border);color:var(--text-2)}
.msg-body{flex:1}
.msg-name{font-size:0.75rem;font-weight:600;margin-bottom:4px;color:var(--text-2)}
.msg.prof .msg-name{color:var(--accent)}
.msg.user .msg-name{color:var(--text-2)}
.msg-text{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:0 12px 12px 12px;padding:12px 16px;
  font-size:0.9rem;line-height:1.65;
}
.msg.user .msg-text{
  background:var(--bg-hover);
  border-radius:12px 0 12px 12px;
}
.msg-text strong{color:var(--accent2)}
.msg-text em{color:var(--accent3)}
.msg-text .highlight{
  background:var(--accent-glow);border-left:3px solid var(--accent);
  padding:8px 12px;border-radius:0 8px 8px 0;margin:8px 0;
  font-size:0.88rem;
}
.feedback-box{
  background:linear-gradient(135deg,#0d1a0d,#0a1020);
  border:1px solid var(--accent2);
  border-radius:12px;padding:16px;margin-top:8px;
}
.feedback-box h4{color:var(--accent2);font-size:0.85rem;margin-bottom:8px;font-family:var(--font-display)}
.feedback-box p{font-size:0.88rem;color:var(--text-1);line-height:1.7}

/* ── Input Area ── */
.chat-input-area{
  margin-top:20px;padding-top:20px;border-top:1px solid var(--border);
}
.chat-input-wrap{display:flex;gap:10px;align-items:flex-end}
.chat-input{
  flex:1;background:var(--bg-hover);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 16px;
  color:var(--text-1);font-family:var(--font-body);font-size:0.9rem;
  resize:none;min-height:52px;max-height:140px;line-height:1.5;
  transition:border-color .2s;
}
.chat-input:focus{outline:none;border-color:var(--accent)}
.chat-input::placeholder{color:var(--text-3)}

/* ── Tools Section ── */
.tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
@media(max-width:640px){.tools-grid{grid-template-columns:1fr}}
.tool-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px}
.tool-panel h3{font-family:var(--font-display);font-size:1rem;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.tool-panel h3 .tool-icon{font-size:1.2rem}
.form-row{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-row label{font-size:0.78rem;color:var(--text-2);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.form-input{
  background:var(--bg-hover);border:1px solid var(--border);
  border-radius:8px;padding:9px 12px;
  color:var(--text-1);font-family:var(--font-body);font-size:0.9rem;
  transition:border-color .2s;width:100%;
}
.form-input:focus{outline:none;border-color:var(--accent)}
.result-box{
  background:var(--bg-base);border:1px solid var(--border);
  border-radius:8px;padding:12px 16px;margin-top:16px;
}
.result-val{font-family:var(--font-display);font-size:1.6rem;font-weight:700;color:var(--accent2)}
.result-label{font-size:0.78rem;color:var(--text-2);margin-top:2px}

/* ── SVG Chart ── */
.chart-wrap{margin-top:16px;overflow:hidden;border-radius:8px;background:var(--bg-base);padding:12px}
#compound-chart{width:100%;height:160px;display:block}
.chart-legend{display:flex;gap:16px;margin-top:8px;font-size:0.75rem;color:var(--text-2)}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}

/* ── Journal ── */
.journal-input{
  width:100%;background:var(--bg-hover);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  color:var(--text-1);font-family:var(--font-body);font-size:0.9rem;
  resize:vertical;min-height:80px;transition:border-color .2s;
}
.journal-input:focus{outline:none;border-color:var(--accent4)}
.journal-list{margin-top:20px;display:flex;flex-direction:column;gap:10px}
.journal-item{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
  animation:fadeUp .3s ease;
}
.journal-item-text{font-size:0.9rem;line-height:1.5;flex:1}
.journal-item-meta{font-size:0.75rem;color:var(--text-3);white-space:nowrap}
.delete-btn{
  background:none;border:none;color:var(--text-3);cursor:pointer;
  font-size:1rem;padding:2px 6px;border-radius:4px;transition:color .2s;
}
.delete-btn:hover{color:var(--danger)}
.journal-tag{
  display:inline-block;background:var(--accent4)22;color:var(--accent4);
  border-radius:4px;padding:2px 8px;font-size:0.72rem;font-weight:600;
  margin-top:6px;
}

/* ── Badges ── */
.badges-grid{display:flex;flex-wrap:wrap;gap:12px;margin-top:16px}
.badge{
  display:flex;align-items:center;gap:10px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 14px;
  font-size:0.82rem;
}
.badge.earned{border-color:var(--accent3);background:#1a150a}
.badge.earned .badge-icon{filter:none}
.badge .badge-icon{font-size:1.3rem;filter:grayscale(1) opacity(.35)}
.badge .badge-name{font-weight:600}
.badge .badge-desc{color:var(--text-2);font-size:0.75rem}
.badge.earned .badge-name{color:var(--accent3)}

/* ── XP Bar ── */
.xp-bar-wrap{margin-top:24px}
.xp-bar-label{display:flex;justify-content:space-between;font-size:0.8rem;color:var(--text-2);margin-bottom:6px}
.xp-bar{height:8px;background:var(--border);border-radius:99px;overflow:hidden}
.xp-bar-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .6s cubic-bezier(.25,.8,.25,1);
}

/* ── Dashboard Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
@media(max-width:640px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
}
.stat-val{font-family:var(--font-display);font-size:1.5rem;font-weight:700;margin-bottom:2px}
.stat-label{font-size:0.75rem;color:var(--text-2)}
.stat-card.blue .stat-val{color:var(--accent)}
.stat-card.green .stat-val{color:var(--accent2)}
.stat-card.orange .stat-val{color:var(--accent3)}
.stat-card.purple .stat-val{color:var(--accent4)}

/* ── Progress Tracker ── */
.progress-tracker{margin-top:8px}
.step-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.step-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:8px;
  background:var(--bg-hover);font-size:0.85rem;
}
.step-item.active{background:var(--accent-glow);border:1px solid var(--accent)}
.step-item.done{color:var(--text-2)}
.step-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:var(--border);
}
.step-item.active .step-dot{background:var(--accent)}
.step-item.done .step-dot{background:var(--accent2)}

/* ── Animations ── */
.fade-in{animation:fadeUp .4s ease both}
.slide-in{animation:slideIn .35s ease both}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* ── Pulse loader ── */
.typing-indicator{display:flex;gap:4px;padding:8px 12px;align-items:center}
.typing-indicator span{
  width:6px;height:6px;border-radius:50%;background:var(--accent);
  animation:pulse 1.2s infinite;
}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* ── Utility ── */
.hidden{display:none!important}
.flex{display:flex}.items-center{align-items:center}
.gap-2{gap:8px}.gap-3{gap:12px}
.mt-4{margin-top:16px}.mt-6{margin-top:24px}.mt-2{margin-top:8px}
.text-sm{font-size:0.85rem}.text-xs{font-size:0.75rem}
.text-muted{color:var(--text-2)}.text-accent{color:var(--accent)}
.text-green{color:var(--accent2)}.text-orange{color:var(--accent3)}
.font-bold{font-weight:700}.font-display{font-family:var(--font-display)}
.w-full{width:100%}
.separator{height:1px;background:var(--border);margin:20px 0}

/* ── Responsive ── */
@media(max-width:768px){
  .topbar{padding:0 16px}
  .main{padding:20px 16px}
  .nav-tabs{padding:12px 16px 0}
}
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-logo">
      <span>💹</span> FINANCE PRO COACH
    </div>
    <div class="xp-pill">
      <span class="xp-label">Crédibilité</span>
      <span class="xp-val" id="xp-display">0 XP</span>
    </div>
  </header>

  <!-- NAV TABS -->
  <nav class="nav-tabs" id="nav-tabs">
    <div class="nav-tab active" data-tab="dashboard">🏠 Dashboard</div>
    <div class="nav-tab" data-tab="modules">📚 Modules</div>
    <div class="nav-tab" data-tab="tools">🛠 Outils</div>
    <div class="nav-tab" data-tab="journal">📓 Journal</div>
    <div class="nav-tab" data-tab="badges">🏆 Badges</div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main" id="main-content"></main>

</div>

<script>
/* ============================================================
   FINANCE PRO COACH — Application Logic
   ============================================================ */

// ── State & Persistence ────────────────────────────────────────
const STORAGE_KEY = 'fpc_state_v1';
let state = {
  xp: 0,
  currentTab: 'dashboard',
  modules: {}, // { m1: { step: 0, answers: [], done: false } }
  journal: [],  // [{ id, text, date }]
  badges: {},   // { badge_id: true }
  toolHistory: {}
};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = { ...state, ...JSON.parse(saved) };
  } catch(e) {}
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ── Module Definitions ─────────────────────────────────────────
const MODULES = [
  {
    id: 'm1', icon: '📈', color: '#4f8eff',
    title: 'PEA & ETF',
    desc: 'Fiscalité 17.2%, diversification mondiale, stratégie DCA',
    steps: [
      {
        prof: `Bienvenue ! Commençons par le **PEA**. Le Plan d'Épargne en Actions est une enveloppe fiscale magique. Après 5 ans de détention, tu paies seulement **17,2% de prélèvements sociaux** sur tes gains — contre 30% (flat tax) en compte-titres ordinaire.\n\n<div class="highlight">💡 Exemple : Tu gagnes 10 000 € sur 10 ans. En PEA = 1 720 € d'impôts. En CTO = 3 000 €. Soit **1 280 € économisés** rien qu'avec le bon wrapper fiscal.</div>\n\nUne stratégie très efficace à ton âge : le **DCA (Dollar Cost Averaging)** — investir une somme fixe chaque mois, indépendamment du prix. Cela lisse le risque et retire l'émotion.\n\n*Question :* Imagine que tu mets 100 €/mois dans un ETF MSCI World dès 16 ans. Quelle différence entre commencer maintenant vs dans 10 ans ? (Utilise tes connaissances sur les intérêts composés)`,
        question: "Quelle est la différence entre investir dès aujourd'hui vs dans 10 ans avec 100€/mois ?",
        feedback: (ans) => `✅ **Excellente analyse !** Tu touches quelque chose de fondamental : le temps est la variable la plus puissante.\n\nVoici les chiffres réels (hypothèse 8%/an, durée 40 ans) :\n- **Dès 16 ans** (40 ans d'investissement) → ~310 000 €\n- **Dès 26 ans** (30 ans d'investissement) → ~136 000 €\n\nDifférence : **+174 000 €** juste pour avoir commencé 10 ans plus tôt avec le même effort mensuel. C'est le miracle des intérêts composés sur une longue durée.`
      },
      {
        prof: `Parfait. Maintenant parlons **ETF (Exchange Traded Fund)**. Un ETF est un panier de titres qui réplique un indice (ex: MSCI World = les 1 500 plus grandes entreprises mondiales).\n\n**Avantages clés :**\n- Frais très bas : 0.1 à 0.3%/an (vs 1.5 à 2% pour un fonds actif)\n- Diversification instantanée mondiale\n- Accessible dès 10€\n\n**Dans un PEA**, tu peux acheter des ETF éligibles comme : Amundi MSCI World, iShares Core MSCI EM, Lyxor S&P 500.\n\n*Question :* Pourquoi un entrepreneur devrait-il diversifier en ETF plutôt que de tout réinvestir dans son business ?`,
        question: "Pourquoi diversifier en ETF plutôt que tout mettre dans son business ?",
        feedback: (ans) => `🎯 **Très bon raisonnement !** La règle d'or de la gestion patrimoniale :\n\n**Ne jamais avoir tous ses œufs dans le même panier**, même si ce panier s'appelle "mon business".\n\nTon business peut : couler, perdre en valeur, être illiquide. Les ETF sont : liquides à J+2, diversifiés mondialement, non corrélés à ton activité.\n\nLa stratégie optimale pour toi : réinvestir dans ton business pour la croissance, ET alimenter un PEA chaque mois pour construire ton patrimoine personnel. Les deux ne s'excluent pas !`
      }
    ]
  },
  {
    id: 'm2', icon: '⚖️', color: '#e05cff',
    title: 'Gestion des Risques',
    desc: 'Volatilité, corrélation d\'actifs, psychologie de marché',
    steps: [
      {

const BADGE_DEFS = [
  { id: 'first_answer', icon: '✍️', name: 'Première Réponse', desc: 'Donner sa première réponse', xp: 25 },
  { id: 'module_1', icon: '📈', name: 'Maître PEA', desc: 'Terminer le module PEA & ETF', xp: 100 },
  { id: 'module_4', icon: '🧾', name: 'Expert Fiscal', desc: 'Terminer le module Fiscalité', xp: 100 },
  { id: 'all_modules', icon: '🎓', name: 'Finance Pro', desc: 'Terminer tous les modules', xp: 500 },
  { id: 'journal_5', icon: '📝', name: 'Journaliste', desc: 'Ajouter 5 questions au journal', xp: 50 },
  { id: 'tools_used', icon: '🛠', name: 'Ingénieur Finance', desc: 'Utiliser les 2 simulateurs', xp: 75 },
  { id: 'xp_200', icon: '⚡', name: 'Momentum', desc: 'Atteindre 200 XP', xp: 0 },
];

function awardBadge(id) {
  if (state.badges[id]) return;
  const badge = BADGE_DEFS.find(b => b.id === id);
  if (!badge) return;
  state.badges[id] = true;
  state.xp += badge.xp;
  saveState();
  updateXPDisplay();
  if (badge.xp > 0) showToast(`🏆 Badge débloqué : ${badge.name} (+${badge.xp} XP)`);
}

function addXP(amount) {
  state.xp += amount;
  if (state.xp >= 200) awardBadge('xp_200');
  saveState();
  updateXPDisplay();
}

function updateXPDisplay() {
  document.getElementById('xp-display').textContent = state.xp + ' XP';
}

// ── Toast ──────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = `
    position:fixed;bottom:24px;right:24px;z-index:9999;
    background:#1e2333;border:1px solid #4f8eff;border-radius:12px;
    padding:12px 20px;font-size:0.88rem;color:#eef0f6;
    box-shadow:0 8px 32px #00000055;animation:fadeUp .3s ease;
    max-width:320px;
  `;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── Router ─────────────────────────────────────────────────────
function navigate(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  renderMain();
}

function renderMain() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  switch(state.currentTab) {
    case 'dashboard': renderDashboard(main); break;
    case 'modules':   renderModules(main); break;
    case 'tools':     renderTools(main); break;
    case 'journal':   renderJournal(main); break;
    case 'badges':    renderBadges(main); break;
    case 'chat':      renderChat(main); break;
  }
}

// ── Dashboard ──────────────────────────────────────────────────

// ── Modules List ───────────────────────────────────────────────
function renderModules(el) {
  el.innerHTML = `
    <div class="fade-in">
      <h2 style="font-size:1.3rem;margin-bottom:6px">📚 Modules de Formation</h2>
      <p class="text-muted text-sm" style="margin-bottom:4px">7 modules pour maîtriser la finance entrepreneuriale</p>
      <div class="module-grid">
        ${MODULES.map(m => {
          const ms = state.modules[m.id];
          const done = ms?.done;
          const step = ms?.step || 0;
          const pct = done ? 100 : Math.round((step / m.steps.length) * 100);
          return `
            <div class="module-card ${done ? 'done' : ''}" onclick="openModule('${m.id}')">
              <div class="mod-icon">${m.icon}</div>
              <div class="mod-title">${m.title}</div>
              <div class="mod-desc">${m.desc}</div>
              <div class="mod-progress">
                <div class="mod-progress-bar" style="width:${pct}%;background:${m.color}"></div>
              </div>
              <div class="text-xs text-muted" style="margin-top:8px">${pct}% complété · ${m.steps.length} étape${m.steps.length > 1 ? 's' : ''}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function openModule(id) {
  state.currentTab = 'chat';
  state._activeModule = id;
  if (!state.modules[id]) state.modules[id] = { step: 0, answers: [], done: false };
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  renderMain();
}

// ── Chat / Module Interface ────────────────────────────────────
function renderChat(el) {
  const id = state._activeModule;
  const mod = MODULES.find(m => m.id === id);
  if (!mod) { navigate('modules'); return; }

  const ms = state.modules[id];
  const currentStep = ms.step;
  const stepDef = mod.steps[currentStep];

  // Build message history
  let messages = [];
  for (let i = 0; i < ms.step; i++) {
    messages.push({ type: 'prof', html: formatMsgText(mod.steps[i].prof) });
    if (ms.answers[i]) {
      messages.push({ type: 'user', text: ms.answers[i] });
      messages.push({ type: 'feedback', html: mod.steps[i].feedback(ms.answers[i]) });
    }
  }
  if (!ms.done && stepDef) {
    messages.push({ type: 'prof', html: formatMsgText(stepDef.prof) });
  }
  if (ms.done) {
    messages.push({ type: 'done' });
  }

  el.innerHTML = `
    <div class="chat-container fade-in">
      <div class="chat-header">
        <button class="back-btn" onclick="navigate('modules')">← Retour</button>
        <div style="font-size:1.5rem">${mod.icon}</div>
        <div>
          <div style="font-family:var(--font-display);font-weight:700">${mod.title}</div>
          <div class="text-xs text-muted">${ms.done ? 'Complété ✓' : `Étape ${currentStep + 1} / ${mod.steps.length}`}</div>
        </div>
        <div style="margin-left:auto">
          <div class="xp-bar" style="width:120px">
            <div class="xp-bar-fill" style="width:${ms.done ? 100 : Math.round((currentStep / mod.steps.length) * 100)}%"></div>
          </div>
        </div>
      </div>

      <div class="chat-messages" id="chat-msgs">
        ${messages.map(renderChatMsg).join('')}
      </div>

      ${!ms.done ? `
        <div class="chat-input-area">
          <div class="text-xs text-muted" style="margin-bottom:8px">💬 ${stepDef?.question || ''}</div>
          <div class="chat-input-wrap">
            <textarea class="chat-input" id="chat-input" placeholder="Tape ta réponse ici..." rows="2"></textarea>
            <button class="btn btn-primary" onclick="submitAnswer('${id}')">Envoyer ↗</button>
          </div>
        </div>
      ` : `
        <div style="text-align:center;padding:20px">
          <button class="btn btn-ghost" onclick="navigate('modules')">← Retour aux modules</button>
          <button class="btn btn-success" style="margin-left:12px" onclick="navigate('dashboard')">Dashboard 🏠</button>
        </div>
      `}
    </div>
  `;

  // Scroll to bottom
  setTimeout(() => {
    const msgs = document.getElementById('chat-msgs');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  }, 100);

  // Enter key submit
  const inp = document.getElementById('chat-input');
  if (inp) {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitAnswer(id); }
    });
  }
}

function renderChatMsg(msg) {
  if (msg.type === 'prof') {
    return `
      <div class="msg prof">
        <div class="msg-avatar">🎓</div>
        <div class="msg-body">
          <div class="msg-name">Prof Finance</div>
          <div class="msg-text">${msg.html}</div>
        </div>
      </div>
    `;
  }
  if (msg.type === 'user') {
    return `
      <div class="msg user">
        <div class="msg-body" style="text-align:right">
          <div class="msg-name">Toi</div>
          <div class="msg-text">${escapeHtml(msg.text)}</div>
        </div>
        <div class="msg-avatar">👤</div>
      </div>
    `;
  }
  if (msg.type === 'feedback') {
    return `
      <div class="msg prof">
        <div class="msg-avatar" style="background:linear-gradient(135deg,#22d3a0,#4f8eff)">✓</div>
        <div class="msg-body">
          <div class="msg-name">Analyse du Prof</div>
          <div class="feedback-box"><p>${formatMsgText(msg.html)}</p></div>
        </div>
      </div>
    `;
  }
  if (msg.type === 'done') {
    return `
      <div class="msg prof">
        <div class="msg-avatar" style="background:linear-gradient(135deg,#f5a623,#ff6b6b)">🏆</div>
        <div class="msg-body">
          <div class="msg-name">Module terminé !</div>
          <div class="msg-text" style="border-color:var(--accent2)">
            <strong>🎉 Félicitations !</strong> Tu as complété ce module. Continue sur les autres pour devenir un vrai Finance Pro.
          </div>
        </div>
      </div>
    `;
  }
  return '';
}

function formatMsgText(text) {
  // Bold, italic, highlight
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>')
    .replace(/<div class="highlight">([\s\S]*?)<\/div>/g, '<div class="highlight">$1</div>');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function submitAnswer(id) {
  const input = document.getElementById('chat-input');
  const answer = input?.value?.trim();
  if (!answer) { showToast('⚠️ Écris une réponse avant d\'envoyer !'); return; }

  const ms = state.modules[id];
  const mod = MODULES.find(m => m.id === id);
  const currentStep = ms.step;

  // Save answer
  if (!ms.answers) ms.answers = [];
  ms.answers[currentStep] = answer;

  // XP & badges
  const xpGain = Math.min(50, Math.max(15, Math.floor(answer.length / 5)));
  addXP(xpGain);
  showToast(`+${xpGain} XP gagné !`);

  if (!state.badges['first_answer']) awardBadge('first_answer');

  // Next step
  ms.step = currentStep + 1;
  if (ms.step >= mod.steps.length) {
    ms.done = true;
    awardBadge('module_' + id.replace('m', ''));
    // Check all modules done
    if (MODULES.every(m => state.modules[m.id]?.done)) awardBadge('all_modules');
  }

  saveState();
  renderMain();
  setTimeout(() => {
    const msgs = document.getElementById('chat-msgs');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  }, 150);
}

function calcCompound() {
  const P = parseFloat(document.getElementById('ci-initial')?.value) || 0;
  const m = parseFloat(document.getElementById('ci-monthly')?.value) || 0;
  const r = (parseFloat(document.getElementById('ci-rate')?.value) || 0) / 100 / 12;
  const n = parseInt(document.getElementById('ci-years')?.value) || 1;
  const months = n * 12;

  // Future value calculation
  let balance = P;
  const dataPoints = [];
  const capitalPoints = [];
  for (let i = 0; i <= months; i++) {
    if (i > 0) balance = balance * (1 + r) + m;
    if (i % Math.max(1, Math.floor(months / 40)) === 0) {
      dataPoints.push(balance);
      capitalPoints.push(P + m * i);
    }
  }

  const total = balance;
  const invested = P + m * months;
  const gains = total - invested;

  const res = document.getElementById('ci-result');
  if (res) res.innerHTML = `
    <div class="result-val">${formatEuro(total)}</div>
    <div class="result-label">Capital final après ${n} ans</div>
    <div style="margin-top:10px;display:flex;gap:16px;font-size:0.8rem">
      <div><span class="text-muted">Versé :</span> <strong>${formatEuro(invested)}</strong></div>
      <div><span class="text-muted">Gains :</span> <strong style="color:var(--accent2)">${formatEuro(gains)}</strong></div>
      <div><span class="text-muted">x</span> <strong style="color:var(--accent3)">${(total/Math.max(1,invested)).toFixed(1)}×</strong></div>
    </div>
  `;

  drawChart(dataPoints, capitalPoints);
}

function drawChart(vals, base) {
  const svg = document.getElementById('compound-chart');
  if (!svg) return;
  const W = 400, H = 160, PAD = 20;
  const maxV = Math.max(...vals, 1);
  const toX = i => PAD + (i / (vals.length - 1)) * (W - PAD * 2);
  const toY = v => H - PAD - ((v / maxV) * (H - PAD * 2));
  const pts = vals.map((v, i) => `${toX(i)},${toY(v)}`).join(' ');
  const bpts = base.map((v, i) => `${toX(i)},${toY(v)}`).join(' ');
  const fillPts = pts + ` ${toX(vals.length-1)},${H-PAD} ${PAD},${H-PAD}`;

  svg.innerHTML = `
    <defs>
      <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4f8eff" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#4f8eff" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <polygon points="${fillPts}" fill="url(#cg)"/>
    <polyline points="${bpts}" fill="none" stroke="#3d4460" stroke-width="1.5" stroke-dasharray="4 3"/>
    <polyline points="${pts}" fill="none" stroke="#4f8eff" stroke-width="2.5" stroke-linejoin="round"/>
  `;
}

function calcCashflow() {
  const loyer = parseFloat(document.getElementById('cf-loyer')?.value) || 0;
  const credit = parseFloat(document.getElementById('cf-credit')?.value) || 0;
  const charges = parseFloat(document.getElementById('cf-charges')?.value) || 0;
  const taxe = parseFloat(document.getElementById('cf-taxe')?.value) || 0;
  const gestion = parseFloat(document.getElementById('cf-gestion')?.value) || 0;
  const vacance = parseFloat(document.getElementById('cf-vacance')?.value) || 0;

  const loyerNet = loyer * (1 - vacance / 12);
  const totalCharges = credit + charges + taxe + gestion;
  const cashflow = loyerNet - totalCharges;
  const annual = cashflow * 12;
  const positive = cashflow >= 0;

  const res = document.getElementById('cf-result');
  if (res) res.innerHTML = `
    <div class="result-val" style="color:${positive ? 'var(--accent2)' : 'var(--danger)'}">${positive ? '+' : ''}${formatEuro(cashflow)}/mois</div>
    <div class="result-label">Cash-flow mensuel net</div>
    <div style="margin-top:10px;font-size:0.8rem;display:flex;flex-direction:column;gap:4px">
      <div class="flex" style="justify-content:space-between"><span class="text-muted">Loyer net vacance</span><span>${formatEuro(loyerNet)}</span></div>
      <div class="flex" style="justify-content:space-between"><span class="text-muted">Total charges</span><span style="color:var(--danger)">-${formatEuro(totalCharges)}</span></div>
      <div style="border-top:1px solid var(--border);margin:4px 0;padding-top:4px" class="flex" style="justify-content:space-between">
        <span class="text-muted">Cash-flow annuel</span>
        <strong style="color:${positive ? 'var(--accent2)' : 'var(--danger)'}">${positive ? '+' : ''}${formatEuro(annual)}</strong>
      </div>
    </div>
    <div style="margin-top:8px;font-size:0.78rem;padding:6px 10px;border-radius:6px;background:${positive ? '#0d1a0d' : '#1a0a0a'};color:${positive ? 'var(--accent2)' : 'var(--danger)'}">
      ${positive ? '✅ Cash-flow positif — investissement rentable' : '⚠️ Cash-flow négatif — revoir le montage'}
    </div>
  `;
}

function formatEuro(n) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n);
}

function addJournalEntry() {
  const text = document.getElementById('journal-text')?.value?.trim();
  if (!text) { showToast('⚠️ Écris une question avant d\'ajouter !'); return; }
  const entry = {
    id: Date.now().toString(),
    text,
    date: new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })
  };
  state.journal.unshift(entry);
  saveState();
  if (state.journal.length >= 5) awardBadge('journal_5');
  addXP(10);
  showToast('+10 XP · Question ajoutée au journal !');
  renderMain();
}

function deleteJournalEntry(id) {
  state.journal = state.journal.filter(e => e.id !== id);
  saveState();
  const el = document.getElementById('journal-' + id);
  if (el) { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; el.style.transition = 'all .2s'; setTimeout(() => el.remove(), 200); }
}
